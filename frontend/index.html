<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CodeMentor — Intelligent Coding Assessment Platform. Write, run, and submit code directly in your browser." />
    <title>CodeMentor — Code. Learn. Grow.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- Google Identity Services — enables "Continue with Google" (needs VITE_GOOGLE_CLIENT_ID) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <!-- Apply the saved/system theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('codementor-theme');
          var theme = stored && stored !== 'system'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
          // Enable theme-switch transitions only AFTER first paint (no load flash).
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              document.documentElement.classList.add('theme-anim');
            });
          });
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
