# Judge0 Configuration File
# Place this alongside docker-compose.yml

# ── Security ──────────────────────────────────────────────────────────────────
# Leave blank for open access during development.
# Set a token in production: AUTHN_HEADER=X-Auth-Token, AUTHN_TOKEN=your_secret
AUTHN_HEADER=
AUTHN_TOKEN=

# ── Redis ────────────────────────────────────────────────────────────────────
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=

# ── PostgreSQL ───────────────────────────────────────────────────────────────
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_secret

# ── Execution Limits ─────────────────────────────────────────────────────────
# Max CPU time per submission (seconds)
CPU_TIME_LIMIT=5
# Max wall-clock time (seconds)
WALL_TIME_LIMIT=10
# Max memory per submission (KB)
MEMORY_LIMIT=262144
# Max stack size (KB)
STACK_LIMIT=65536
# Max number of processes
MAX_PROCESSES_AND_OR_THREADS=60
# Enable network access inside sandbox (false for security)
ENABLE_NETWORK=false

# ── Workers ──────────────────────────────────────────────────────────────────
COUNT_OF_RUN_WORKERS=2
COUNT_OF_JUDGE_WORKERS=2

# ── Misc ─────────────────────────────────────────────────────────────────────
# Max submission size in bytes
MAX_SUBMISSION_BATCH_SIZE=20
