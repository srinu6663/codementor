# Judge0 Configuration File
# Place this alongside docker-compose.yml

# ── Security ──────────────────────────────────────────────────────────────────
# Leave blank for open access during development.
# Set a token in production: AUTHN_HEADER=X-Auth-Token, AUTHN_TOKEN=your_secret
AUTHN_HEADER=
AUTHN_TOKEN=

# ── Redis ────────────────────────────────────────────────────────────────────
REDIS_HOST=redis
REDIS_PORT=6379

# ── PostgreSQL ───────────────────────────────────────────────────────────────
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_secret

# ── Execution Limits ─────────────────────────────────────────────────────────
# Max CPU time per submission (seconds)
CPU_TIME_LIMIT=5
# Max wall-clock time (seconds)
WALL_TIME_LIMIT=10
# Max memory per submission (KB)
MEMORY_LIMIT=262144
# Max stack size (KB)
STACK_LIMIT=65536
# Max number of processes
MAX_PROCESSES_AND_OR_THREADS=60
# ── cgroup v2 / Docker Desktop fix ───────────────────────────────────────────
# Docker Desktop + WSL2 uses cgroup v2, but isolate expects cgroup v1
# (/sys/fs/cgroup/memory/). Setting both flags to "true" forces isolate to
# use rlimit (per-process) instead of --cg (cgroup memory tracking).
# This removes the --cg flag entirely, making isolate work on cgroup v2.
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true
# Enable network access inside sandbox (false for security)
ENABLE_NETWORK=false

# ── Workers ──────────────────────────────────────────────────────────────────
COUNT_OF_RUN_WORKERS=2
COUNT_OF_JUDGE_WORKERS=2

# ── Misc ─────────────────────────────────────────────────────────────────────
# Max submission size in bytes
MAX_SUBMISSION_BATCH_SIZE=20
