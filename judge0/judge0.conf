# Judge0 CE — Hardened Configuration
# https://github.com/judge0/judge0
# Run: docker compose up -d  (from the judge0/ directory)

# ── Authentication ────────────────────────────────────────────────────────────
# Set AUTHN_TOKEN to a strong secret in production.
# Your Express backend must send:  X-Auth-Token: <token>  on every request.
# Leave blank only for local development behind a firewall.
AUTHN_HEADER=X-Auth-Token
AUTHN_TOKEN=

# ── Redis & PostgreSQL connection ─────────────────────────────────────────────
# NOTE: connection settings (REDIS_HOST, POSTGRES_HOST/USER/PASSWORD, etc.) are
# intentionally NOT set here. They are provided by docker-compose.yml's
# `environment:` block so they always match the actual container names
# (judge0_redis / judge0_db) and the JUDGE0_DB_PASSWORD from .env.
# Setting them here would override compose and break connectivity.

# ── Queue protection ─────────────────────────────────────────────────────────
# Reject new submissions with 503 when the queue reaches this size.
# Prevents memory exhaustion during exam spikes; tune to your server's RAM.
MAX_QUEUE_SIZE=100

# ── Feature toggles (attack surface reduction) ───────────────────────────────
# Disable compiler options — students cannot pass -O3, -fsanitize, etc.
ENABLE_COMPILER_OPTIONS=false
# Disable command-line arguments — prevents argument-injection attacks.
ENABLE_COMMAND_LINE_ARGUMENTS=false
# Disable submission delete — prevents result tampering via the API.
ENABLE_SUBMISSION_DELETE=false
# Enable batched submissions — required for our batch judging feature.
ENABLE_BATCHED_SUBMISSIONS=true
MAX_SUBMISSION_BATCH_SIZE=20

# ── Hard ceilings on per-submission overrides ────────────────────────────────
# Students/API callers cannot request limits higher than these values,
# even if they send cpu_time_limit/memory_limit in the request body.
MAX_CPU_TIME_LIMIT=10
MAX_WALL_TIME_LIMIT=20
# 1 GB ceiling — the worker applies a per-language memory multiplier
# (Python/JS/TS = 3× of 256 MB = 768 MB), which must stay under this max,
# otherwise Judge0 rejects the submission with HTTP 422.
MAX_MEMORY_LIMIT=1048576

# ── Default execution limits ─────────────────────────────────────────────────
# These are the defaults when no limits are sent in the request.
# Our worker always sends explicit limits (with per-language multipliers),
# so these are only the fallback.
CPU_TIME_LIMIT=5
WALL_TIME_LIMIT=10
MEMORY_LIMIT=262144
STACK_LIMIT=65536

# ── Output size caps (output-bomb protection) ────────────────────────────────
# Truncate stdout/stderr at these byte limits.
# Prevents while(1) print() from filling disk or the DB column.
STDOUT_LIMIT=65536
STDERR_LIMIT=65536

# ── Process / file limits (fork-bomb and file-exhaustion protection) ─────────
MAX_PROCESSES_AND_OR_THREADS=30
MAX_FILE_SIZE=4096

# ── cgroup v2 / Docker Desktop + WSL2 fix ───────────────────────────────────
# Docker Desktop on Windows uses cgroup v2; isolate expects v1.
# These flags switch isolate to rlimit-based enforcement instead of --cg.
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true

# ── Network ──────────────────────────────────────────────────────────────────
# Submitted code must never make outbound network calls.
ENABLE_NETWORK=false

# ── Workers ──────────────────────────────────────────────────────────────────
COUNT_OF_RUN_WORKERS=2
COUNT_OF_JUDGE_WORKERS=2
